# =============================================================================
# Nginx INTERNO de la PWA — sirve el SPA estático en HTTP :80 (sin TLS).
#
# El edge nginx de pos_api termina TLS y hace reverse-proxy a este contenedor
# (pwa:80) en ${PWA_DOMAIN}. Aquí NO hay TLS, ACME ni redirect: solo servir
# estáticos con SPA-fallback y los Cache-Control correctos. Los security
# headers (HSTS, etc.) los añade el edge.
#
# Config plana (no .template): nginx la usa directo, sin envsubst.
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health plano para el healthcheck del contenedor y el edge.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Assets con hash de contenido (SvelteKit _app/immutable): cache agresivo.
    location /_app/immutable/ {
        expires max;
        access_log off;
        try_files $uri =404;
    }

    # Service worker / manifest / index: revalidar SIEMPRE (no-cache).
    location = /service-worker.js { expires -1; }
    location = /sw.js { expires -1; }
    location = /manifest.webmanifest { expires -1; }
    location = /index.html { expires -1; }

    # SPA fallback: todo lo que no es archivo cae en index.html.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
