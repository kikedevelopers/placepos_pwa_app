# =============================================================================
# PlacePOS PWA - Docker Compose de PRODUCCION (SPA estatico + TLS).
#
# Stack minimo (no hay DB ni backend aqui; el API es pos_api, aparte):
#   - web     : imagen pulleada del registry (${IMAGE_NAME}) = nginx + SPA
#               horneado. Sirve estaticos 80/443 con HSTS/headers de seguridad.
#               Reload cada 6h para tomar el cert renovado.
#   - certbot : renueva certificados Let's Encrypt cada 12h via webroot.
#
# Usado por `./deploy.sh`. Debugging:
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml logs -f web
# =============================================================================

services:
  web:
    image: ${IMAGE_NAME:-ghcr.io/CHANGEME/placepos_pwa_app:latest}
    container_name: placepos_pwa_web
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
      # Limita envsubst a ${DOMAIN}; el resto de $var del config nginx
      # ($host, $request_uri, $uri...) NO se intentan sustituir.
      NGINX_ENVSUBST_TEMPLATE_VARS: 'DOMAIN'
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Arranca nginx (via su entrypoint oficial, que corre envsubst sobre los
    # templates) y, en paralelo, recarga cada 6h para tomar el cert nuevo.
    command: >
      /bin/sh -c "/docker-entrypoint.sh nginx -g 'daemon off;' & NGINX_PID=$$!; (while :; do sleep 6h & wait $${!}; nginx -s reload 2>/dev/null || true; done) & wait $$NGINX_PID"
    networks:
      - pwa_network

  certbot:
    image: certbot/certbot:latest
    container_name: placepos_pwa_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
    networks:
      - pwa_network

networks:
  pwa_network:
    name: placepos_pwa_network
    driver: bridge
