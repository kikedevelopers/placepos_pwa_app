# =============================================================================
# Build, push & deploy — PWA PlacePOS
#
# 1. Construye la imagen Docker (SPA + nginx) y la publica en GHCR
#    (ghcr.io/<owner>/<repo>:latest, :sha-<sha>, :<semver>).
#    La URL del API se hornea en build-time via build-arg PUBLIC_API_URL.
# 2. Si el push fue a `main`, hace SSH a la VM y corre `./deploy.sh`.
#
# Variables/Secrets requeridos (Settings → Secrets and variables → Actions):
#   VARIABLE  PUBLIC_API_URL    URL del backend pos_api en produccion
#                               (ej: https://foxpos.kikedevs.com). Se hornea
#                               en el bundle del SPA al construir.
#   SECRET    DEPLOY_HOST       IP o dominio de la VM.
#   SECRET    DEPLOY_USER       Usuario SSH.
#   SECRET    DEPLOY_SSH_KEY    Clave privada SSH (contenido completo).
#   SECRET    DEPLOY_PATH       Ruta del stack EDGE (pos_api) en la VM, donde
#                               vive docker-compose.prod.yml (ej: /opt/pos_api).
#   SECRET    GHCR_DEPLOY_TOKEN PAT con scope read:packages (la VM pullea la imagen).
#
# Arquitectura (misma VM, nginx compartido): el edge nginx de pos_api sirve la
# PWA en ${PWA_DOMAIN} haciendo proxy al contenedor `pwa`. Por eso el deploy de
# la PWA NO levanta su propio stack: solo pullea la imagen nueva y recrea el
# servicio `pwa` del compose de pos_api. (Requiere que el stack de pos_api ya
# esté desplegado con PWA_IMAGE_NAME apuntando a esta imagen.)
#
# Los secrets de deploy viven en el environment "PLACEPOS" (igual que pos_api).
# =============================================================================

name: Build, push & deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # URL del API horneada en el SPA. Configurable via repo Variable.
          build-args: |
            PUBLIC_API_URL=${{ vars.PUBLIC_API_URL || 'https://foxpos.kikedevs.com' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    needs: build-push
    runs-on: ubuntu-latest
    environment: PLACEPOS
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            # Login a GHCR para pullear la imagen privada de la PWA.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            # Pullea la imagen recién publicada y recrea SOLO el servicio pwa
            # dentro del stack del edge (pos_api). No toca api/postgres/nginx.
            docker compose -f docker-compose.prod.yml pull pwa
            docker compose -f docker-compose.prod.yml up -d pwa
            docker image prune -f >/dev/null 2>&1 || true
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
